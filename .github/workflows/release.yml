name: Release

on:
  release:
    types: [published]
  workflow_dispatch: ~

jobs:
  publish:
    name: Publish to NuGet
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install just
        shell: bash
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP:-/tmp}/just-bin"
          mkdir -p "$install_dir"
          # Resolve the latest release tag via the github.com redirect to avoid
          # api.github.com rate limits on shared runner egress IPs.
          latest_url=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/casey/just/releases/latest)
          just_version="${latest_url##*/tag/}"
          case "$RUNNER_OS" in
            Windows) asset="just-${just_version}-x86_64-pc-windows-msvc.zip" ;;
            macOS)   asset="just-${just_version}-x86_64-apple-darwin.tar.gz" ;;
            *)       asset="just-${just_version}-x86_64-unknown-linux-musl.tar.gz" ;;
          esac
          curl -fL "https://github.com/casey/just/releases/download/${just_version}/${asset}" -o "$install_dir/$asset"
          case "$asset" in
            *.zip) unzip -o "$install_dir/$asset" -d "$install_dir" ;;
            *)     tar -xzf "$install_dir/$asset" -C "$install_dir" ;;
          esac
          echo "$install_dir" >> "$GITHUB_PATH"
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            6.x.x
            7.x.x
            8.x.x
            9.x.x
            10.x.x

      - name: Setup Nuget
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet Packages
        run: just restore

      - name: Set up dotnet tools and dependencies
        run: just install

      - name: Set up authenticity certificate
        run: |
          echo "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > /d/Certificate_pkcs12.p12
        shell: bash

      - name: Set variables
        id: variables
        run: |
          echo "SM_HOST=${{ secrets.SM_HOST }}" >> "$GITHUB_ENV"
          echo "SM_API_KEY=${{ secrets.SM_API_KEY }}" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_FILE=D:\\Certificate_pkcs12.p12" >> "$GITHUB_ENV"
          echo "SM_CLIENT_CERT_PASSWORD=${{ secrets.SM_CLIENT_CERT_PASSWORD }}" >> "$GITHUB_ENV"
          echo "C:\Program Files (x86)\Windows Kits\10\App Certification Kit" >> $GITHUB_PATH
          echo "C:\Program Files (x86)\Microsoft SDKs\Windows\v10.0A\bin\NETFX 4.8 Tools" >> $GITHUB_PATH
          echo "C:\Program Files\DigiCert\DigiCert Keylocker Tools" >> $GITHUB_PATH
        shell: bash

      - name: Setup Keylocker KSP on Windows
        run: |
          curl -X GET  https://one.digicert.com/signingmanager/api-ui/v1/releases/Keylockertools-windows-x64.msi/download -H "x-api-key:%SM_API_KEY%" -o Keylockertools-windows-x64.msi
          msiexec /i Keylockertools-windows-x64.msi /quiet /qn
          smksp_registrar.exe list
          smctl.exe keypair ls
          C:\Windows\System32\certutil.exe -csp "DigiCert Signing Manager KSP" -key -user
        shell: cmd

      - name: Sync Certificates
        run: |
          smctl windows certsync
        shell: cmd

      - name: Build and Sign NuGet package
        run: |
          call scripts\win\build_release_nuget.bat EasyPost EasyPostNETStrongNameSigning.snk "${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}" "${{ secrets.SM_CODE_SIGNING_CERT_SHA256_HASH }}" Release
        shell: cmd

      - name: Publish to NuGet
        run: just publish ${{ secrets.NUGET_API_KEY }}

      - name: Upload NuGet package to release
        uses: AButler/upload-release-assets@v3.0.1
        with:
          files: '*.nupkg'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
